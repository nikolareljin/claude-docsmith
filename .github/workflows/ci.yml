name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    uses: nikolareljin/ci-helpers/.github/workflows/python.yml@0.7.2
    with:
      python_version: "3.11"
      lint_command: "pip install -e '.[dev]' && ruff check src tests"
      test_command: "pip install -e '.[dev]' && pytest && python -m compileall src"
